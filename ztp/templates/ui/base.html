<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Network Automation{% endblock %} — NetAuto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #080e1a;
            --surface:   #0f1928;
            --surface2:  #162033;
            --border:    #1e2f47;
            --border2:   #253550;
            --text:      #e2eaf6;
            --text2:     #8aa0c0;
            --text3:     #4a6080;
            --accent:    #3b9eff;
            --accent2:   #1d6fd8;
            --green:     #22c55e;
            --orange:    #f59e0b;
            --red:       #ef4444;
            --cyan:      #06b6d4;
            --radius:    10px;
            --nav-w:     220px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            font-size: 14px;
            line-height: 1.5;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--nav-w);
            min-height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            z-index: 100;
        }

        .sidebar-logo {
            padding: 22px 20px 18px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-logo .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            border-radius: 8px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 16px; margin-bottom: 10px;
        }
        .sidebar-logo .logo-title {
            font-size: 13px; font-weight: 700;
            color: var(--text); letter-spacing: 0.3px;
        }
        .sidebar-logo .logo-sub {
            font-size: 11px; color: var(--text3); margin-top: 1px;
        }

        .sidebar-nav { padding: 12px 10px; flex: 1; }
        .nav-label {
            font-size: 10px; font-weight: 600; color: var(--text3);
            text-transform: uppercase; letter-spacing: 1px;
            padding: 8px 10px 6px;
        }
        .sidebar-nav a {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; border-radius: 8px;
            color: var(--text2); text-decoration: none;
            font-size: 13px; font-weight: 500;
            transition: all 0.15s; margin-bottom: 2px;
        }
        .sidebar-nav a .nav-icon { font-size: 15px; width: 20px; text-align: center; }
        .sidebar-nav a:hover { background: var(--surface2); color: var(--text); }
        .sidebar-nav a.active {
            background: rgba(59,158,255,0.12);
            color: var(--accent);
            box-shadow: inset 3px 0 0 var(--accent);
        }
        .sidebar-nav a.active .nav-icon { color: var(--accent); }

        .sidebar-footer {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            font-size: 11px; color: var(--text3);
        }

        /* ── Main content ── */
        .main {
            margin-left: var(--nav-w);
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            height: 56px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 28px;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar-title {
            font-size: 15px; font-weight: 600; color: var(--text);
        }

        .container { padding: 28px; max-width: 1280px; width: 100%; }

        /* ── Typography ── */
        h1 { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
        h2 { font-size: 14px; font-weight: 600; color: var(--text2); }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 18px;
        }
        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        /* ── Tables ── */
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: var(--surface2); }
        th {
            text-align: left; padding: 9px 16px;
            color: var(--text3); font-weight: 600;
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
            border-bottom: 1px solid var(--border);
        }
        td { padding: 11px 16px; border-bottom: 1px solid var(--border); color: var(--text2); }
        tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.1s; }
        tbody tr:hover td { background: rgba(255,255,255,0.02); color: var(--text); }

        /* ── Badges ── */
        .badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 600; letter-spacing: 0.2px;
        }
        .badge::before { content: '●'; font-size: 7px; }
        .badge-pending  { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }
        .badge-approved { background: rgba(34,197,94,0.1);   color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
        .badge-deployed { background: rgba(6,182,212,0.1);   color: #06b6d4; border: 1px solid rgba(6,182,212,0.2); }
        .badge-rejected { background: rgba(239,68,68,0.1);   color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
        .badge-failed   { background: rgba(239,68,68,0.1);   color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }

        /* ── Buttons ── */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 7px;
            font-size: 13px; font-weight: 500;
            cursor: pointer; border: none; text-decoration: none;
            transition: all 0.15s; white-space: nowrap; font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: var(--accent); color: #fff;
            box-shadow: 0 1px 8px rgba(59,158,255,0.25);
        }
        .btn-primary:hover { background: #2d8ae0; box-shadow: 0 2px 12px rgba(59,158,255,0.35); }
        .btn-success {
            background: #166534; color: #4ade80;
            border: 1px solid rgba(34,197,94,0.2);
        }
        .btn-success:hover { background: #15803d; color: #fff; }
        .btn-danger  {
            background: rgba(239,68,68,0.1); color: #ef4444;
            border: 1px solid rgba(239,68,68,0.2);
        }
        .btn-danger:hover  { background: #b91c1c; color: #fff; }
        .btn-ghost {
            background: var(--surface2); color: var(--text2);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--border); color: var(--text); }
        .btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 6px; }

        /* ── Diff / Code blocks ── */
        .diff-block {
            background: #060c14; border: 1px solid var(--border);
            border-radius: 8px; overflow: auto;
            font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.7;
        }
        .diff-block pre { padding: 16px; }
        .diff-add { color: #4ade80; background: rgba(34,197,94,0.07); display: block; }
        .diff-del { color: #f87171; background: rgba(239,68,68,0.07); display: block; }
        .diff-info { color: var(--text3); display: block; }
        .diff-ctx  { color: #4a6080; display: block; }

        .config-block {
            background: #060c14; border: 1px solid var(--border);
            border-radius: 8px; overflow: auto; max-height: 520px;
        }
        .config-block pre {
            padding: 16px; font-family: 'JetBrains Mono', monospace;
            font-size: 12px; line-height: 1.7; color: var(--text2);
        }

        /* ── Layout helpers ── */
        .flex { display: flex; gap: 10px; align-items: center; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .meta { color: var(--text3); font-size: 12px; }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
        .empty { text-align: center; padding: 56px; color: var(--text3); }
        .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

        /* ── Loading overlay ── */
        #loading-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(8,14,26,0.88);
            backdrop-filter: blur(6px);
            z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center; gap: 18px;
        }
        #loading-overlay.active { display: flex; }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid var(--border2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-message { color: var(--text2); font-size: 14px; font-weight: 500; }
        .loading-dots::after {
            content: '';
            animation: dots 1.4s steps(4, end) infinite;
        }
        @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-message"><span id="loading-text">Processing</span><span class="loading-dots"></span></div>
</div>

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-title">NetAuto</div>
        <div class="logo-sub">Network Automation</div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-label">Main</div>
        <a href="/ui" {% if active == 'dashboard' %}class="active"{% endif %}>
            <span class="nav-icon">▦</span> Pipeline Runs
        </a>
        <a href="/ui/devices" {% if active == 'devices' %}class="active"{% endif %}>
            <span class="nav-icon">◫</span> Devices
        </a>
    </nav>
    <div class="sidebar-footer">
        ZTP Server · v1.0
    </div>
</aside>

<!-- Main -->
<div class="main">
    <div class="topbar">
        <span class="topbar-title">{% block title %}Network Automation{% endblock %}</span>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const overlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');

        document.querySelectorAll('form[data-loading]').forEach(function (form) {
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                if (form.dataset.confirm && !confirm(form.dataset.confirm)) return;
                loadingText.textContent = form.dataset.loading || 'Processing';
                overlay.classList.add('active');
                requestAnimationFrame(() => form.submit());
            });
        });
    });
</script>
</body>
</html>
