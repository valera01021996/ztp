<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Network Automation{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        nav { background: #1e293b; border-bottom: 1px solid #334155; padding: 0 24px; display: flex; align-items: center; height: 56px; gap: 32px; }
        nav .logo { font-size: 16px; font-weight: 700; color: #38bdf8; letter-spacing: 0.5px; }
        nav a { color: #94a3b8; text-decoration: none; font-size: 14px; padding: 4px 0; border-bottom: 2px solid transparent; }
        nav a:hover, nav a.active { color: #e2e8f0; border-bottom-color: #38bdf8; }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
        h1 { font-size: 22px; font-weight: 600; color: #f1f5f9; margin-bottom: 24px; }
        h2 { font-size: 16px; font-weight: 600; color: #cbd5e1; margin-bottom: 16px; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 24px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 10px 16px; color: #64748b; font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #334155; }
        td { padding: 12px 16px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
        tr:hover td { background: #1e293b; }
        tr:last-child td { border-bottom: none; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-pending  { background: #422006; color: #fb923c; }
        .badge-approved { background: #052e16; color: #4ade80; }
        .badge-deployed { background: #0c1a2e; color: #38bdf8; }
        .badge-rejected { background: #2d0a0a; color: #f87171; }
        .badge-failed   { background: #2d0a0a; color: #f87171; }
        .btn { display: inline-block; padding: 8px 18px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; text-decoration: none; }
        .btn-primary { background: #0284c7; color: #fff; }
        .btn-primary:hover { background: #0369a1; }
        .btn-success { background: #15803d; color: #fff; }
        .btn-success:hover { background: #166534; }
        .btn-danger  { background: #b91c1c; color: #fff; }
        .btn-danger:hover  { background: #991b1b; }
        .btn-sm { padding: 5px 12px; font-size: 13px; }
        a.btn { text-align: center; }
        .diff-block { background: #0f172a; border: 1px solid #334155; border-radius: 6px; overflow: auto; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; }
        .diff-block pre { padding: 16px; }
        .diff-add { color: #4ade80; background: #052e16; display: block; }
        .diff-del { color: #f87171; background: #2d0a0a; display: block; }
        .diff-info { color: #64748b; display: block; }
        .diff-ctx { color: #94a3b8; display: block; }
        .config-block { background: #0f172a; border: 1px solid #334155; border-radius: 6px; overflow: auto; max-height: 500px; }
        .config-block pre { padding: 16px; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; color: #94a3b8; }
        .flex { display: flex; gap: 12px; align-items: center; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .meta { color: #64748b; font-size: 13px; }
        .empty { text-align: center; padding: 48px; color: #475569; }

        /* Loading overlay */
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(3px);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        #loading-overlay.active { display: flex; }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #334155;
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-message {
            color: #94a3b8;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        #loading-overlay .loading-dots::after {
            content: '';
            animation: dots 1.4s steps(4, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
        }
    </style>
</head>
<body>
<div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-message"><span id="loading-text">Processing</span><span class="loading-dots"></span></div>
</div>
<nav>
    <span class="logo">Network Automation</span>
    <a href="/ui" {% if active == 'dashboard' %}class="active"{% endif %}>Pipeline Runs</a>
    <a href="/ui/devices" {% if active == 'devices' %}class="active"{% endif %}>Devices</a>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const overlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');

        document.querySelectorAll('form[data-loading]').forEach(function (form) {
            form.addEventListener('submit', function (e) {
                // onsubmit confirm dialogs — if cancelled, don't show overlay
                if (form.dataset.confirm) {
                    if (!confirm(form.dataset.confirm)) {
                        e.preventDefault();
                        return;
                    }
                }
                loadingText.textContent = form.dataset.loading || 'Processing';
                overlay.classList.add('active');
            });
        });
    });
</script>
</body>
</html>
