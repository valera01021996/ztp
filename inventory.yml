        ip: 1.1.1.4/32

      - name: Vlan20
        type: virtual
        vrf: PROD
        ip: 10.20.20.1/24
        description: SERVERS SVI

    config_context:
      bgp:
        asn: 65000
        neighbors:
          - ip: 1.1.1.201
            remote_as: 65000
            description: Spine-1
            update_source: Loopback0
            evpn: true
          # нет второго neighbor — один Spine

      vxlan:
        source_interface: Loopback0   # standalone: переопределяем fabric.yml (там Loopback1)
        vlan_vnis:
          - vlan: 20
            vni: 10020
        flood_vteps:
          - 2.2.1.1                   # Loopback1 anycast MLAG пары Leaf-1/Leaf-2
          - 1.1.1.3                   # Loopback0 Leaf-3 (standalone)

    port_channels:
      - name: Port-Channel1
        type: lag
