    config_context:
      # Только device-specific данные — остальное берётся из fabric.yml (Role: leaf)

      mlag:
        peer_address: 10.0.254.2      # IP Vlan4094 MLAG-партнёра

      bgp:
        asn: 65000
        neighbors:
          - ip: 1.1.1.201
            remote_as: 65000
            description: Spine-1
            update_source: Loopback0
            evpn: true
          - ip: 1.1.1.202
            remote_as: 65000
            description: Spine-2
            update_source: Loopback0
            evpn: true

      vxlan:
        vlan_vnis:
          - vlan: 20
            vni: 10020
          - vlan: 36
            vni: 10036
        flood_vteps:
          # MLAG партнёр (Leaf-2) НЕ указывается — у них один Loopback1 (2.2.1.1)
          - 1.1.1.3                   # Loopback0 Leaf-3 (standalone)
          - 1.1.1.4                   # Loopback0 Leaf-4 (standalone)

